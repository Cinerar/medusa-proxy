services:
  medusa-proxy:
    build: .
    container_name: medusa-proxy-codex
    tty: true
    environment:
      # Number of Privoxy instances (HTTP proxy endpoints)
      - HEADS=1
      # Number of Tor instances per Privoxy
      - TORS=7
      # How often to check if Tor instances are working
      - PROXY_CHECK_INTERVAL=20m
      # How often to rotate Tor circuits (change IP addresses)
      - PROXY_ROTATE_INTERVAL=3h
      # Maximum time to wait for at least one Tor instance to become available
      - PROXY_STARTUP_TIMEOUT=10m
      # Comma-separated country codes for Tor exit nodes
      - TOR_EXIT_NODES=de,nl,fi,se,fr
      # UI mode: "none" (legacy), "status" (single line), "full" (split screen)
      - UI_MODE=full
      # How often to check if working Tor instances can reach the target URL
      - PROXY_LIVENESS_INTERVAL=2m
      # URL to check for liveness (must be reachable through Tor)
      - PROXY_LIVENESS_URL=https://api.telegram.org
      # Timeout for liveness check requests in seconds
      - PROXY_LIVENESS_TIMEOUT=10
      # Jitter percentage to add randomness to liveness check interval (prevents predictable patterns)
      - PROXY_LIVENESS_JITTER=20
      # Enable individual HTTP proxy endpoints for each Tor instance (0=disabled, 1=enabled)
      # When enabled, creates separate HTTP proxies on ports 8890, 8891, 8892, etc.
      # Each individual proxy routes through a specific Tor instance for a fixed IP
      - ENABLE_INDIVIDUAL_PROXIES=0
      # Base port for individual proxy endpoints (default: 8890)
      # Individual proxies will be created on ports: 8890, 8891, 8892, ...
      - INDIVIDUAL_PROXY_BASE_PORT=8890
    volumes:
      - ./bridges-only.txt:/bridges.lst:ro
    ports:
      - "8888:8888"      # HTTP proxy (Privoxy instance 0 - balanced across all Tor)
      - "1080:1080"      # SOCKS proxy (HAProxy)
      - "2090:2090"      # HAProxy stats
      - "8800:8800"      # List all heads
      # Individual proxy endpoints (only needed if ENABLE_INDIVIDUAL_PROXIES=1)
      # Uncomment these if you need fixed IP routing per Tor instance
      # - "8890:8890"    # Individual proxy -> Tor instance #1
      # - "8891:8891"    # Individual proxy -> Tor instance #2
      # - "8892:8892"    # Individual proxy -> Tor instance #3
      # - "8893:8893"    # Individual proxy -> Tor instance #4
      # - "8894:8894"    # Individual proxy -> Tor instance #5
      # - "8895:8895"    # Individual proxy -> Tor instance #6
      # - "8896:8896"    # Individual proxy -> Tor instance #7
    restart: unless-stopped
